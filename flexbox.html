<!DOCTYPE html>
<html>
    <head>
        <title>flexbox</title>
        <style>
            div{
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
                width: 400px;
                height: 300px;
                background-color: lightcoral;
            }
            .flex-container div{
                width: 50px;
                height: 50px;
                background-color: white;
                margin: 5px;
                padding: 5px;
            }
        </style>
    </head>
    <body>
        <h1>flexbox</h1>
        <div class="flex-container">
        <div>1</div>
        <div>2</div>
        <div>3</div>
        <div>4</div>
        <div>5</div>
        </div>
    </body>
</html>
